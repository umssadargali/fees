<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding-top: 70px; }
        .nav { background: var(--p); display: flex; justify-content: center; padding: 12px; gap: 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .nav button { padding: 8px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: #3949ab; color: white; }
        .nav button.active { background: #ff9800; color: #000; }
        .container { max-width: 550px; margin: 20px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--p); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .calc-box { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .btn-save { width: 100%; padding: 16px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
        
        /* Receipt Style from Screenshot */
        #receipt-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 20px 10px; }
        .receipt-box { border: 2.5px solid var(--p); padding: 25px; border-radius: 20px; max-width: 400px; margin: auto; }
        .r-header { text-align: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 15px; }
        .r-logo { width: 60px; height: 60px; border: 2px solid var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; margin: 0 auto; color: var(--p); }
        .r-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .r-table tr { border-bottom: 1px solid #eee; }
        .r-table td { padding: 8px 0; }
        @media print { .no-print { display: none; } #receipt-modal { position: absolute; top:0; } }
    </style>
</head>
<body>

<div class="nav">
    <button id="b1" class="active" onclick="tab('entry')">NEW ENTRY</button>
    <button id="b2" onclick="tab('search')">SEARCH/PRINT</button>
    <button onclick="location.href='report.html'">REPORTS</button>
</div>

<div id="entry-div" class="container">
    <div class="grid">
        <div><label>Student ID</label><input type="text" id="StudentId"></div>
        <div><label>Month</label><select id="Month">
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
        </select></div>
        <div style="grid-column: span 2;"><label>Student Name</label><input type="text" id="StudentName"></div>
        <div style="grid-column: span 2;"><label>Father's Name</label><input type="text" id="FatherName"></div>
        <div><label>Class</label><input type="text" id="Class"></div>
        <div><label>Prev Dues</label><input type="number" id="PrevDues" value="0" oninput="doCalc()"></div>
        <div><label>School Fee</label><input type="number" id="SchoolFee" value="0" oninput="doCalc()"></div>
        <div><label>Academy Fee</label><input type="number" id="AcademyFee" value="0" oninput="doCalc()"></div>
        <div><label>Misc Fee</label><input type="number" id="MiscellaneousFee" value="0" oninput="doCalc()"></div>
        <div><label>Books</label><input type="number" id="Books" value="0" oninput="doCalc()"></div>
        <div class="calc-box">
            <div><label>Total</label><input type="number" id="TotalDues" readonly></div>
            <div><label>Paid</label><input type="number" id="TotalPaid" value="0" oninput="doCalc()"></div>
            <div><label>Balance</label><input type="number" id="Remaining" readonly></div>
        </div>
    </div>
    <button class="btn-save" onclick="saveData()">SAVE & GENERATE RECEIPT</button>
</div>

<div id="search-div" class="container" style="display:none">
    <div style="display:flex; gap:10px;">
        <input type="text" id="q_id" placeholder="Enter ID...">
        <button onclick="findData()" style="padding:0 20px; background:var(--p); color:white; border:none; border-radius:8px;">SEARCH</button>
    </div>
    <div id="res-list" style="margin-top:20px;"></div>
</div>

<div id="receipt-modal">
    <div class="receipt-box">
        <div class="r-header">
            <div class="r-logo">IPS</div>
            <h2 style="margin:5px 0 0; color:var(--p);">IQRA PUBLIC SCHOOL</h2>
            <div style="background:var(--p); color:white; padding:2px 15px; border-radius:10px; font-size:10px; display:inline-block;">FEE RECEIPT</div>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold;">
            <span>ID: <span id="r_id"></span></span>
            <span>Date: <span id="r_date"></span></span>
        </div>
        <div style="font-size:13px; margin:10px 0;">
            <b>Name:</b> <span id="r_name"></span> | <b>Class:</b> <span id="r_class"></span><br>
            <b>Father:</b> <span id="r_father"></span> | <b>Month:</b> <span id="r_mon"></span>
        </div>
        <table class="r-table">
            <tbody id="r_items"></tbody>
            <tfoot>
                <tr style="font-weight:bold; color:var(--p);"><td>TOTAL PAID</td><td align="right" id="r_paid"></td></tr>
                <tr style="color:red; font-size:12px;"><td>Balance Amount</td><td align="right" id="r_rem"></td></tr>
            </tfoot>
        </table>
        <div class="no-print" style="text-align:center; margin-top:25px;">
            <button onclick="window.print()" style="padding:10px 20px; background:var(--p); color:white; border:none; border-radius:5px;">PRINT / PDF</button>
            <button onclick="closeR()" style="padding:10px 20px; margin-left:10px;">BACK</button>
        </div>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyY6vSVjhOCH47m2vGpF-rdvFGzrGvrULhHGuDCNsq0ZdMeqbkC8kY9Gi8XeDjU2aJe/exec";

    function tab(t) {
        document.getElementById('entry-div').style.display = t==='entry'?'block':'none';
        document.getElementById('search-div').style.display = t==='search'?'block':'none';
        document.getElementById('b1').className = t==='entry'?'active':'';
        document.getElementById('b2').className = t==='search'?'active':'';
    }

    function doCalc() {
        let ids = ['PrevDues','SchoolFee','AcademyFee','MiscellaneousFee','Books'];
        let total = ids.reduce((s, id) => s + (parseFloat(document.getElementById(id).value) || 0), 0);
        let paid = parseFloat(document.getElementById('TotalPaid').value) || 0;
        document.getElementById('TotalDues').value = total;
        document.getElementById('Remaining').value = total - paid;
    }

    async function saveData() {
        let inputs = document.querySelectorAll('#entry-div input, #entry-div select');
        let data = {};
        inputs.forEach(i => data[i.id] = i.value);
        if(!data.StudentId) return Swal.fire('Error', 'ID bhariye!', 'error');

        Swal.fire({ title: 'Saving...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        fetch(URL, { method: "POST", body: JSON.stringify(data) })
        .then(() => {
            Swal.fire('Saved!', 'Fees record updated.', 'success');
            showR(data);
        });
    }

    function findData() {
        let id = document.getElementById('q_id').value;
        fetch(URL + "?action=searchData&id=" + id)
        .then(res => res.json()).then(res => {
            let html = "";
            res.forEach(r => {
                html += `<div style="padding:10px; border:1px solid #ddd; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between; background:white;">
                    <span><b>${r.Month}</b> - ${r.StudentName}</span>
                    <button onclick='showR(${JSON.stringify(r)})' style="background:var(--p); color:white; border:none; padding:5px 10px; border-radius:4px;">View</button>
                </div>`;
            });
            document.getElementById('res-list').innerHTML = html || "No records.";
        });
    }

    function showR(r) {
        document.getElementById('r_id').innerText = r.StudentId || r.id;
        document.getElementById('r_name').innerText = r.StudentName || r.name;
        document.getElementById('r_father').innerText = r.FatherName || r.father;
        document.getElementById('r_class').innerText = r.Class || r.className;
        document.getElementById('r_mon').innerText = r.Month || r.mon;
        document.getElementById('r_date').innerText = r.PaidDate || new Date().toLocaleDateString('en-GB');
        
        let items = [
            {l: "Previous Dues", v: r.PrevDues || r.prev},
            {l: "School Fee", v: r.SchoolFee || r.sfee},
            {l: "Academy Fee", v: r.AcademyFee || r.afee},
            {l: "Misc Fee", v: r.MiscellaneousFee || r.pfund},
            {l: "Books", v: r.Books}
        ];
        document.getElementById('r_items').innerHTML = items.map(i => `<tr><td>${i.l}</td><td align="right">₹${i.v || 0}</td></tr>`).join('');
        document.getElementById('r_paid').innerText = "₹" + (r.TotalPaid || r.paid || 0);
        document.getElementById('r_rem').innerText = "₹" + (r.Remaining || r.remain || 0);
        document.getElementById('receipt-modal').style.display = 'block';
    }
    function closeR() { document.getElementById('receipt-modal').style.display = 'none'; }
</script>
</body>
</html>
